<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>♡</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Poppins',sans-serif;

  background:
  radial-gradient(circle at top,#ff4fa355 0%,transparent 35%),
  radial-gradient(circle at bottom,#ff99cc33 0%,transparent 35%),
  linear-gradient(135deg,#120012,#250020,#39002d,#160016);

  position:relative;
}

/* LOVE + FLOWER */
.bg-love{
  position:absolute;
  width:100%;
  height:100%;
  overflow:hidden;
  pointer-events:none;
}

.bg-love span{
  position:absolute;
  display:block;
  font-size:25px;
  animation:float linear infinite;
  opacity:0.15;
}

@keyframes float{

  0%{
    transform:translateY(100vh) rotate(0deg);
  }

  100%{
    transform:translateY(-120vh) rotate(360deg);
  }

}

.container{

  width:340px;

  background:rgba(255,255,255,0.08);

  border:1px solid rgba(255,255,255,0.1);

  backdrop-filter:blur(15px);

  padding:35px 25px;

  border-radius:35px;

  text-align:center;

  box-shadow:
  0 0 30px rgba(255,20,147,0.3),
  0 0 60px rgba(255,105,180,0.12);

  z-index:10;
}

.title{

  color:#ffd1e8;

  font-size:24px;

  font-weight:600;

  margin-bottom:25px;

  text-shadow:0 0 15px hotpink;
}

.input-box{
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

input{

  width:100%;

  text-align:center;

  padding:15px;

  border:none;

  outline:none;

  border-radius:18px;

  background:rgba(255,255,255,0.12);

  color:white;

  font-size:15px;
}

input::placeholder{
  color:#ffc0df;
}

button{

  width:100%;

  margin-top:15px;

  padding:15px;

  border:none;

  border-radius:18px;

  background:linear-gradient(135deg,#ff4fa3,#ff0088);

  color:white;

  font-size:15px;

  font-weight:600;

  cursor:pointer;

  transition:0.3s;

  box-shadow:0 0 20px rgba(255,20,147,0.35);
}

button:hover{
  transform:scale(1.03);
}

#result{
  margin-top:20px;
}

video{

  width:100%;

  border-radius:25px;

  overflow:hidden;

  box-shadow:0 0 30px rgba(255,105,180,0.35);
}

img{

  width:100%;

  border-radius:25px;

  box-shadow:0 0 30px rgba(255,105,180,0.35);
}

.text{

  margin-top:12px;

  color:#ffd5e8;

  font-size:15px;

  text-shadow:0 0 10px hotpink;
}

.error{

  color:#ff9bc8;

  font-weight:600;
}

/* GIF */
.gif-box img{

  width:220px;

  animation:bounce 2s ease-in-out infinite;
}

@keyframes bounce{

  0%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-10px);
  }

  100%{
    transform:translateY(0px);
  }

}

</style>
</head>

<body>

<!-- BACKGROUND LOVE -->
<div class="bg-love">

<span style="left:5%; animation-duration:15s;">💖</span>
<span style="left:18%; animation-duration:18s;">🌸</span>
<span style="left:35%; animation-duration:14s;">💕</span>
<span style="left:50%; animation-duration:20s;">🌷</span>
<span style="left:70%; animation-duration:17s;">💗</span>
<span style="left:85%; animation-duration:22s;">🌸</span>

</div>

<div class="container">

<div class="title">
masukkan kode
</div>

<div class="input-box">

<input 
type="text"
id="codeInput"
placeholder="♡"
>

</div>

<button onclick="openSecret()">
buka
</button>

<div id="result"></div>

</div>

<script>

function openSecret(){

const code = document
.getElementById("codeInput")
.value
.toLowerCase()
.trim();

const result = document.getElementById("result");


// VIDEO
if(code === "salsaholic"){

result.innerHTML = `

<video controls autoplay>

<source 
src="https://drive.google.com/uc?export=download&id=1-Tl2HtuxtbKMvPiprIVLoFSGp4PkJ7Y7"
type="video/mp4">

</video>

<div class="text">
💖 salsaholic mode activated 💖
</div>

`;

}


// FOTO
else if(code === "beheee"){

result.innerHTML = `

<a 
href="https://drive.google.com/drive/folders/1oq_REnUSrsyiDAz0lX0fusaIVxLxiz0F"
target="_blank"
>

<img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=1200&auto=format&fit=crop">

</a>

<div class="text">
🌸 tap gambar untuk membuka folder 🌸
</div>

`;

}


// GIF
else if(code === "eskrim"){

result.innerHTML = `

<div class="gif-box">

<img src="https://media.tenor.com/2roX3uxz_68AAAAi/cute-pink.gif">

<div class="text">
🍦 pink doll eating ice cream 🍦
</div>

</div>

`;

}


// SALAH
else{

result.innerHTML = `

<div class="error">
kode tidak ditemukan 💔
</div>

`;

}

}

</script>

</body>
</html>
